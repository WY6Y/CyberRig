<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CyberRig — Waterfall</title>
<meta name="theme-color" content="#0b140b">
<link rel="icon" type="image/png" sizes="32x32" href="/static/icons/favicon-32.png">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #060b06; --panel: #0b140b; --border: #2a5a2a;
  --green: #33ff99; --gdim: #66cc88; --gbright: #66ff66;
  --orange: #ffaa33; --red: #ff4444; --blue: #44bbff;
}
html, body {
  height: 100%; background: var(--bg); color: var(--green);
  font-family: Consolas, 'Cascadia Mono', 'Segoe UI Mono', monospace;
  font-size: 14px; font-weight: 600;
}
body { display: flex; flex-direction: column; min-height: 100vh; }

#bar {
  display: flex; flex-wrap: wrap; align-items: center; gap: 10px;
  padding: 8px 12px; background: #050c05; border-bottom: 1px solid var(--border);
}
.logo { font-weight: 800; font-size: 16px; color: var(--gbright); letter-spacing: 2px; }
.sep { color: var(--border); }
label { font-size: 12px; color: var(--gdim); font-weight: 700; }
select, button {
  font-family: inherit; font-weight: 700; font-size: 12px;
  background: var(--panel); color: var(--green); border: 1px solid var(--border);
  padding: 5px 10px; cursor: pointer;
}
select { max-width: 280px; }
button:hover { border-color: var(--gbright); color: var(--gbright); }
button.on { background: #004422; border-color: var(--gbright); color: var(--gbright); }
button.danger { border-color: #553333; color: var(--red); }
button.listen-on { background: #003355; border-color: var(--blue); color: var(--blue); }
input[type=range] { accent-color: #33ff99; vertical-align: middle; }
#status { font-size: 12px; color: var(--gdim); margin-left: auto; }
#status.live { color: var(--gbright); }
#status.err { color: var(--orange); }
#exp-badge {
  font-size: 10px; font-weight: 800; color: var(--orange); border: 1px solid var(--orange);
  padding: 2px 6px; letter-spacing: 1px; border-radius: 2px;
}

#meta {
  display: flex; gap: 16px; flex-wrap: wrap; padding: 6px 12px;
  border-bottom: 1px solid var(--border); background: var(--panel);
  font-size: 13px; font-weight: 700;
}
#meta b { color: var(--gbright); }

#canvas-wrap {
  flex: 1; position: relative; min-height: 200px;
  background: #020502; cursor: crosshair;
}
#wf {
  display: block; width: 100%; height: 100%;
  image-rendering: pixelated;
}
#axis {
  height: 28px; background: #050c05; border-top: 1px solid var(--border);
  position: relative; font-size: 11px; color: var(--gdim); font-weight: 700;
}
#axis span {
  position: absolute; transform: translateX(-50%); top: 6px; white-space: nowrap;
}
#hint {
  position: absolute; left: 12px; top: 10px; z-index: 2;
  font-size: 12px; color: var(--orange); font-weight: 700;
  text-shadow: 0 0 6px #000; pointer-events: none;
}
#cross {
  position: absolute; top: 0; bottom: 0; width: 1px; background: #ffffff66;
  pointer-events: none; display: none; z-index: 1;
}
#cross-lbl {
  position: absolute; top: 8px; transform: translateX(6px);
  background: #000c; color: var(--gbright); font-size: 12px; font-weight: 800;
  padding: 2px 6px; border: 1px solid var(--border); white-space: nowrap;
}
#vfoline {
  position: absolute; top: 0; bottom: 0; width: 2px; background: var(--orange);
  pointer-events: none; z-index: 1; display: none; box-shadow: 0 0 6px var(--orange);
}
</style>
</head>
<body>

<div id="bar">
  <button onclick="backToMain()" title="Back to main CyberRig screen">← BACK</button>
  <span class="logo">CYBERRIG · WATERFALL</span>
  <span id="exp-badge" title="RTL-SDR panadapter mode is experimental: needs its own gain/dB tuning per dongle and band, and depends on a separate rtl_tcp server. The Audio FFT source (LISTEN) is the stable fallback.">EXPERIMENTAL — RTL MODE</span>
  <span class="sep">|</span>
  <label>Span</label>
  <select id="span" onchange="onSpanChange()">
    <option value="10000">10 kHz (nitty-gritty)</option>
    <option value="50000">50 kHz</option>
    <option value="150000">150 kHz</option>
    <option value="250000">250 kHz (zoom)</option>
    <option value="512000">512 kHz</option>
    <option value="1024000">1.024 MHz</option>
    <option value="1536000">1.536 MHz</option>
    <option value="2048000" selected>2.048 MHz</option>
    <option value="2400000">2.4 MHz (wide)</option>
  </select>
  <label>Speed</label>
  <select id="speed" onchange="applySpeed()">
    <option value="1">1/sec (slow)</option>
    <option value="2">2/sec</option>
    <option value="4">4/sec</option>
    <option value="6" selected>6/sec (default)</option>
    <option value="10">10/sec</option>
    <option value="15">15/sec</option>
    <option value="20">20/sec</option>
    <option value="30">30/sec (fast)</option>
  </select>
  <button id="btn-start" onclick="doStart()">▶ Start</button>
  <button id="btn-stop" class="danger" onclick="doStop()">■ Stop</button>
  <button id="btn-listen" onclick="toggleListen()">🎧 Listen</button>
  <label>Vol</label>
  <input id="vol" type="range" min="5" max="300" value="100" style="width:90px"
         oninput="setListenVol(+this.value/100)">
  <label>Floor</label>
  <input id="floor" type="number" step="1" value="5" style="width:60px">
  <label>Ceil</label>
  <input id="ceil" type="number" step="1" value="55" style="width:60px">
  <button onclick="applyRange()">Apply range</button>
  <span id="status">Connecting…</span>
</div>

<div id="meta">
  <span>VFO <b id="vfo">—</b></span>
  <span>MODE <b id="mode">—</b></span>
  <span>DEVICE <b id="devname">—</b></span>
  <span id="clickhint">CLICK = QSY to that frequency</span>
</div>

<div id="canvas-wrap">
  <div id="hint">Starting RTL Panadapter…</div>
  <div id="cross"><div id="cross-lbl"></div></div>
  <div id="vfoline"></div>
  <canvas id="wf"></canvas>
</div>
<div id="axis"></div>

<script src="/static/lan-audio.js"></script>
<script>
const HISTORY = 280;

// Always navigate this window/tab back to the main screen. On desktop this
// popup was opened via window.open(); on iOS (no real popup windows —
// window.open just navigates in-place with no window chrome/back button)
// this is the only way back, so it must work unconditionally, not rely on
// window.close()/window.opener which iOS Safari won't reliably honor.
function backToMain() { location.href = '/'; }

const lanAudio = new LanAudioPlayer();
lanAudio.onStatus((msg, cls) => {
  // keep waterfall status for spectrum; show listen on button
  const b = document.getElementById('btn-listen');
  if (b) {
    b.classList.toggle('listen-on', lanAudio.isPlaying);
    b.textContent = lanAudio.isPlaying ? '🎧 Listening' : '🎧 Listen';
  }
  if (cls === 'err') setStatus(msg, 'err');
});
function toggleListen() { lanAudio.toggle(); }
function setListenVol(g) { lanAudio.setGain(g); }
const COLORMAP = buildColormap();
let ws = null;
let nBins = 512;
let sampleRate = 12000;
let vfo = 0;
let mode = 'USB';
let running = false;
const source = 'rtl';       // always RTL — the Yaesu audio-FFT waterfall view was removed from this UI (2026-07-22); the Listen/PCM audio path is unaffected
let centerHz = 0;           // RTL panadapter center frequency (two-sided IQ span)
let img; // ImageData buffer rows
let rowPtr = 0; // next write row (scroll by shifting)
const canvas = document.getElementById('wf');
const ctx = canvas.getContext('2d', { alpha: false });
const wrap = document.getElementById('canvas-wrap');
const hint = document.getElementById('hint');
const statusEl = document.getElementById('status');
const cross = document.getElementById('cross');
const crossLbl = document.getElementById('cross-lbl');
const vfoLine = document.getElementById('vfoline');
const clickHint = document.getElementById('clickhint');

function buildColormap() {
  // black → blue → cyan → green → yellow → red
  const stops = [
    [0.00, [0, 0, 20]],
    [0.25, [0, 0, 180]],
    [0.50, [0, 200, 200]],
    [0.70, [0, 220, 0]],
    [0.85, [240, 220, 0]],
    [1.00, [255, 50, 0]],
  ];
  const cmap = new Uint8ClampedArray(256 * 3);
  for (let i = 0; i < 256; i++) {
    const t = i / 255;
    for (let j = 0; j < stops.length - 1; j++) {
      const [t0, c0] = stops[j], [t1, c1] = stops[j + 1];
      if (t >= t0 && t <= t1) {
        const f = (t - t0) / (t1 - t0 || 1);
        cmap[i*3]   = (c0[0] + f * (c1[0] - c0[0])) | 0;
        cmap[i*3+1] = (c0[1] + f * (c1[1] - c0[1])) | 0;
        cmap[i*3+2] = (c0[2] + f * (c1[2] - c0[2])) | 0;
        break;
      }
    }
  }
  return cmap;
}

function setStatus(text, cls) {
  statusEl.textContent = text;
  statusEl.className = cls || '';
}

function formatFreq(hz) {
  if (!hz) return '—';
  const M = Math.floor(hz / 1e6);
  const k = Math.floor((hz % 1e6) / 1e3);
  const h = hz % 1000;
  return `${M}.${String(k).padStart(3,'0')}.${String(h).padStart(3,'0')}`;
}

function resize() {
  const w = wrap.clientWidth;
  const h = wrap.clientHeight;
  if (w < 2 || h < 2) return;
  canvas.width = w;
  canvas.height = h;
  // Re-init scroll buffer at display width × HISTORY
  img = ctx.createImageData(nBins, HISTORY);
  // fill dark
  for (let i = 0; i < img.data.length; i += 4) {
    img.data[i] = 2; img.data[i+1] = 5; img.data[i+2] = 2; img.data[i+3] = 255;
  }
  rowPtr = 0;
  drawAxis();
  updateVfoLine();
  paint();
}

function niceStepKHz(rough) {
  const steps = [1, 2, 5, 10, 20, 50, 100, 200, 500, 1000];
  for (const s of steps) if (rough <= s) return s;
  return 1000;
}

function drawAxis() {
  const axis = document.getElementById('axis');
  axis.innerHTML = '';
  const w = axis.clientWidth || wrap.clientWidth;
  if (source === 'rtl') {
    // Two-sided IQ spectrum centered on centerHz, not baseband 0..sr/2
    const half = sampleRate / 2;
    const lo = centerHz - half, hi = centerHz + half;
    const spanKHz = (hi - lo) / 1000;
    const step = niceStepKHz(spanKHz / 10);
    const startKHz = Math.ceil(lo / 1000 / step) * step;
    for (let khz = startKHz; khz * 1000 <= hi; khz += step) {
      const x = ((khz * 1000 - lo) / (hi - lo)) * w;
      const sp = document.createElement('span');
      sp.style.left = x + 'px';
      sp.textContent = khz + ' kHz';
      axis.appendChild(sp);
    }
  } else {
    const maxHz = sampleRate / 2;
    for (let khz = 0; khz <= maxHz / 1000; khz++) {
      const sp = document.createElement('span');
      const x = (khz * 1000 / maxHz) * w;
      sp.style.left = x + 'px';
      sp.textContent = khz + ' kHz';
      axis.appendChild(sp);
    }
  }
}

function updateVfoLine() {
  if (source !== 'rtl' || !centerHz || !sampleRate) {
    vfoLine.style.display = 'none';
    return;
  }
  const half = sampleRate / 2;
  const frac = (vfo - (centerHz - half)) / (2 * half);
  if (!vfo || frac < 0 || frac > 1) {
    vfoLine.style.display = 'none';
    return;
  }
  vfoLine.style.display = 'block';
  vfoLine.style.left = (frac * 100) + '%';
}

function addRow(bins) {
  if (!img) return;
  nBins = bins.length;
  // If buffer width mismatch, rebuild
  if (img.width !== nBins) {
    img = ctx.createImageData(nBins, HISTORY);
    for (let i = 0; i < img.data.length; i += 4) {
      img.data[i] = 2; img.data[i+1] = 5; img.data[i+2] = 2; img.data[i+3] = 255;
    }
    rowPtr = 0;
  }
  // Scroll up: move all rows up by 1
  const rowBytes = nBins * 4;
  img.data.copyWithin(0, rowBytes);
  const base = (HISTORY - 1) * rowBytes;
  for (let x = 0; x < nBins; x++) {
    const v = bins[x] & 255;
    const ci = v * 3;
    const o = base + x * 4;
    img.data[o]     = COLORMAP[ci];
    img.data[o + 1] = COLORMAP[ci + 1];
    img.data[o + 2] = COLORMAP[ci + 2];
    img.data[o + 3] = 255;
  }
  paint();
}

function paint() {
  if (!img) return;
  // Draw offscreen then scale to canvas
  const off = document.createElement('canvas');
  off.width = nBins;
  off.height = HISTORY;
  off.getContext('2d').putImageData(img, 0, 0);
  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(off, 0, 0, canvas.width, canvas.height);
}

function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}/ws/waterfall`);
  ws.onopen = () => setStatus('Connected — press Start', '');
  ws.onclose = () => {
    setStatus('Disconnected — retrying…', 'err');
    running = false;
    setTimeout(connectWS, 2000);
  };
  ws.onerror = () => setStatus('WebSocket error', 'err');
  ws.onmessage = (ev) => {
    let msg;
    try { msg = JSON.parse(ev.data); } catch { return; }
    if (msg.type === 'hello') {
      if (msg.vfo) { vfo = msg.vfo; document.getElementById('vfo').textContent = formatFreq(vfo); }
      if (msg.mode) { mode = msg.mode; document.getElementById('mode').textContent = mode; }
      if (msg.rtl_status && msg.rtl_status.running) {
        // RTL panadapter already live server-side (e.g. page refresh) — reflect it, don't re-issue start
        centerHz = msg.rtl_status.center_hz || centerHz;
        sampleRate = msg.rtl_status.sample_rate || sampleRate;
        nBins = msg.rtl_status.out_bins || nBins;
        if (msg.rtl_status.db_min != null) document.getElementById('floor').value = msg.rtl_status.db_min;
        if (msg.rtl_status.db_max != null) document.getElementById('ceil').value = msg.rtl_status.db_max;
        running = true;
        setStatus('LIVE · RTL Panadapter', 'live');
        hint.style.display = 'none';
        onSourceUiUpdate();
        drawAxis();
        updateVfoLine();
      } else if (msg.status) {
        sampleRate = msg.status.sample_rate || sampleRate;
        nBins = msg.status.out_bins || nBins;
        drawAxis();
      }
    } else if (msg.type === 'row') {
      // This page only ever shows the RTL panadapter now. Enabling "Listen"
      // starts the separate Yaesu USB-audio engine purely for its PCM stream —
      // that engine emits its own (untagged) FFT rows too, which used to get
      // drawn into this same canvas, overlaying the two waterfalls. Ignore
      // anything that isn't explicitly tagged from the RTL engine.
      if ((msg.source || 'audio') !== 'rtl') return;
      if (msg.vfo) { vfo = msg.vfo; document.getElementById('vfo').textContent = formatFreq(vfo); }
      if (msg.mode) { mode = msg.mode; document.getElementById('mode').textContent = mode; }
      const axisStale = (msg.sr && msg.sr !== sampleRate) || (msg.center_hz && msg.center_hz !== centerHz);
      if (msg.sr) sampleRate = msg.sr;
      if (msg.center_hz) centerHz = msg.center_hz;
      if (msg.bins) {
        running = true;
        hint.style.display = 'none';
        addRow(msg.bins);
        if (axisStale) drawAxis();
        updateVfoLine();
      }
    } else if (msg.type === 'status') {
      if (msg.ok === false) {
        setStatus(msg.error || 'Start failed', 'err');
        hint.textContent = msg.error || (source === 'rtl'
          ? 'Start failed — is rtl_tcp reachable at the configured rtl_host? (Experimental — see README.)'
          : 'Start failed — pick the FTDX10 USB device');
        hint.style.display = 'block';
        running = false;
      } else if (msg.running) {
        setStatus('LIVE · ' + (source === 'rtl' ? 'RTL Panadapter' : (msg.device_name || 'audio')), 'live');
        document.getElementById('devname').textContent = source === 'rtl' ? 'RTL rtl_tcp' : (msg.device_name || '—');
        hint.style.display = 'none';
        running = true;
        if (msg.center_hz) centerHz = msg.center_hz;
        if (msg.sample_rate) sampleRate = msg.sample_rate;
        if (msg.db_min != null) document.getElementById('floor').value = msg.db_min;
        if (msg.db_max != null) document.getElementById('ceil').value = msg.db_max;
        onSourceUiUpdate();
        drawAxis();
        updateVfoLine();
      } else {
        setStatus('Stopped', '');
        running = false;
      }
    } else if (msg.type === 'qsy' && msg.ok) {
      vfo = msg.freq;
      document.getElementById('vfo').textContent = formatFreq(vfo);
    }
  };
}

function onSourceUiUpdate() {
  clickHint.textContent = 'CLICK = QSY to that frequency';
}

function onSpanChange() {
  doStart();  // re-sends with the new sample_rate; server restarts if it actually changed
}

function doStart() {
  if (!ws || ws.readyState !== 1) return;
  const body = { type: 'start', source, sample_rate: +document.getElementById('span').value };
  setStatus('Starting…', '');
  ws.send(JSON.stringify(body));
  applyRange();
  applySpeed();
}

function doStop() {
  if (!ws || ws.readyState !== 1) return;
  ws.send(JSON.stringify({ type: 'stop' }));
  setStatus('Stopped', '');
  running = false;
}

function applyRange() {
  if (!ws || ws.readyState !== 1) return;
  ws.send(JSON.stringify({
    type: 'range',
    db_min: +document.getElementById('floor').value,
    db_max: +document.getElementById('ceil').value,
  }));
}

function applySpeed() {
  if (!ws || ws.readyState !== 1) return;
  ws.send(JSON.stringify({
    type: 'speed',
    rows_per_sec: +document.getElementById('speed').value,
  }));
}

// Click → QSY
canvas.addEventListener('click', (e) => {
  const rect = canvas.getBoundingClientRect();
  const x = (e.clientX - rect.left) / rect.width;
  if (source === 'rtl') {
    const half = sampleRate / 2;
    const absHz = Math.round((centerHz - half) + x * (2 * half));
    fetch('/api/freq', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ hz: absHz }),
    }).then(r => r.json()).then(j => {
      vfo = absHz;
      document.getElementById('vfo').textContent = formatFreq(vfo);
      updateVfoLine();
    }).catch(() => {});
  } else {
    if (!ws || ws.readyState !== 1) return;
    const offsetHz = Math.round(x * (sampleRate / 2));
    ws.send(JSON.stringify({ type: 'qsy', offset_hz: offsetHz }));
  }
});

canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const frac = x / rect.width;
  cross.style.display = 'block';
  cross.style.left = x + 'px';
  if (source === 'rtl') {
    const half = sampleRate / 2;
    const absHz = Math.round((centerHz - half) + frac * (2 * half));
    crossLbl.textContent = formatFreq(absHz);
  } else {
    const offsetHz = Math.round(frac * (sampleRate / 2));
    let abs = vfo + offsetHz;
    const m = (mode || '').toUpperCase();
    if (['LSB','CW-L','RTTY-L','DATA-L'].includes(m)) abs = vfo - offsetHz;
    crossLbl.textContent = `+${offsetHz} Hz → ${formatFreq(abs)}`;
  }
});
canvas.addEventListener('mouseleave', () => { cross.style.display = 'none'; });

onSourceUiUpdate();
window.addEventListener('resize', () => { resize(); });
resize();
connectWS();

// Auto-start after hello devices load. RTL Panadapter is the default/only
// waterfall source (see EXPERIMENTAL badge above) — if it shares a dongle
// with another decoder via cybersdr_api_url, opening this page pauses that
// decoder for as long as this page stays open.
setTimeout(() => {
  if (!running && ws && ws.readyState === 1) doStart();
}, 800);
</script>
</body>
</html>
